<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Ventas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="contenedor">
        <h1>Sistema de Ventas</h1>
        <form>
            <label>Cliente:</label>
            <input type="text" id="lblCli" placeholder="Ingrese nombre del cliente">
            <label>Producto:</label>
            <input type="text" id="lblEma"placeholder="Ingrese produco">
            <label>Cantidad:</label>
            <input type="number" id="cantidad" min="0" step="1" placeholder="Ingrese cantidad"> 
            <label>Precio Unitario:</label>
            <input type="number" id="precio" min="0" step="1" placeholder="Ingrese precio">
            <label>Total:</label>
            <input type="text" id="inputTotal" readonly placeholder="Resultado"> 
            <button type="button" id="btnCalcular">Calcular Total</button>
            <button type="submit" id="btnRegistrar">Registrar Venta</button>
            <div id="resultado"></div>

        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
